<!DOCTYPE html>
<html>
    <head>
        <title>Interoperable GIS System</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@latest/ol.css">
        <link rel="stylesheet" href="css/style.css">
        <script src=" https://cdn.jsdelivr.net/npm/ol@latest/dist/ol.js"></script>
    </head>
    <body>

        <h2>Interoperable GIS System</h2>
        
        <div class="button-bar">
            <button onclick="getCapabilities()">Get Capabilities</button>
            <button onclick="getMapImage()">Get Map</button>
            <button onclick="getFeature()">Get Feature</button>
        </div>
        
        <div class="main-container">
        
            <div class="left-panel">
                <h3>Parsed Layers</h3>
                <ul id="layerList"></ul>
            </div>
        
            <div class="map-panel">
                <div id="map"></div>
            </div>
        
        </div>
        
        <div class="xml-panel">
            <h3>XML Response</h3>
            <pre id="output"></pre>
        </div>
        
        <script src="js/map.js"></script>
        <script src="js/ogcRequests.js"></script>
        
        </body>
    
</html>
